spring:
  application:
    name: ai-radar-backend
  datasource:
    url: ${AI_RADAR_DB_URL:jdbc:postgresql://localhost:5432/ai_radar}
    username: ${AI_RADAR_DB_USERNAME:ai_radar}
    password: ${AI_RADAR_DB_PASSWORD:ai_radar}
    hikari:
      maximum-pool-size: ${AI_RADAR_DB_MAX_POOL_SIZE:10}
      minimum-idle: ${AI_RADAR_DB_MIN_IDLE:2}
      connection-timeout: ${AI_RADAR_DB_CONNECTION_TIMEOUT_MS:30000}
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    clean-disabled: true

ai-radar:
  analysis:
    provider: ${AI_RADAR_ANALYSIS_PROVIDER:openai}
    model-name: ${AI_RADAR_ANALYSIS_MODEL_NAME:gpt-4.1-mini}
    schema-version: ${AI_RADAR_ANALYSIS_SCHEMA_VERSION:cluster-brief.v1}
    prompt-version: ${AI_RADAR_ANALYSIS_PROMPT_VERSION:cluster-brief.prompt.v1}
    openai:
      base-url: ${AI_RADAR_OPENAI_BASE_URL:https://api.openai.com/v1}
      api-key: ${AI_RADAR_OPENAI_API_KEY:}
      connect-timeout: ${AI_RADAR_OPENAI_CONNECT_TIMEOUT:5s}
      read-timeout: ${AI_RADAR_OPENAI_READ_TIMEOUT:30s}
      max-attempts: ${AI_RADAR_OPENAI_MAX_ATTEMPTS:2}
  collector:
    arxiv:
      base-url: ${AI_RADAR_ARXIV_BASE_URL:https://export.arxiv.org/api}
      connect-timeout: ${AI_RADAR_ARXIV_CONNECT_TIMEOUT:3s}
      read-timeout: ${AI_RADAR_ARXIV_READ_TIMEOUT:8s}
      max-attempts: ${AI_RADAR_ARXIV_MAX_ATTEMPTS:2}
      min-request-interval: ${AI_RADAR_ARXIV_MIN_REQUEST_INTERVAL:3s}
    github:
      base-url: ${AI_RADAR_GITHUB_BASE_URL:https://api.github.com}
      connect-timeout: ${AI_RADAR_GITHUB_CONNECT_TIMEOUT:3s}
      read-timeout: ${AI_RADAR_GITHUB_READ_TIMEOUT:8s}
      max-attempts: ${AI_RADAR_GITHUB_MAX_ATTEMPTS:2}
      token: ${AI_RADAR_GITHUB_TOKEN:}
    hugging-face:
      base-url: ${AI_RADAR_HF_BASE_URL:https://huggingface.co}
      connect-timeout: ${AI_RADAR_HF_CONNECT_TIMEOUT:3s}
      read-timeout: ${AI_RADAR_HF_READ_TIMEOUT:8s}
      max-attempts: ${AI_RADAR_HF_MAX_ATTEMPTS:2}
      token: ${AI_RADAR_HF_TOKEN:}
    hacker-news:
      base-url: ${AI_RADAR_HN_BASE_URL:https://hacker-news.firebaseio.com/v0}
      connect-timeout: ${AI_RADAR_HN_CONNECT_TIMEOUT:3s}
      read-timeout: ${AI_RADAR_HN_READ_TIMEOUT:5s}
      max-attempts: ${AI_RADAR_HN_MAX_ATTEMPTS:2}
  operations:
    scheduled-crawl:
      enabled: ${AI_RADAR_SCHEDULED_CRAWL_ENABLED:false}
      fixed-delay: ${AI_RADAR_SCHEDULED_CRAWL_FIXED_DELAY:60s}
      initial-delay: ${AI_RADAR_SCHEDULED_CRAWL_INITIAL_DELAY:30s}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

logging:
  level:
    root: INFO
    com.airadar: ${AI_RADAR_LOG_LEVEL:INFO}
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] [%X{requestId:-}] %logger{36} - %msg%n"
