spring:
  application:
    name: ai-radar-backend
  datasource:
    url: ${AI_RADAR_DB_URL:jdbc:postgresql://localhost:5432/ai_radar}
    username: ${AI_RADAR_DB_USERNAME:ai_radar}
    password: ${AI_RADAR_DB_PASSWORD:ai_radar}
    hikari:
      maximum-pool-size: ${AI_RADAR_DB_MAX_POOL_SIZE:10}
      minimum-idle: ${AI_RADAR_DB_MIN_IDLE:2}
      connection-timeout: ${AI_RADAR_DB_CONNECTION_TIMEOUT_MS:30000}
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    clean-disabled: true

ai-radar:
  collector:
    hacker-news:
      base-url: ${AI_RADAR_HN_BASE_URL:https://hacker-news.firebaseio.com/v0}
      connect-timeout: ${AI_RADAR_HN_CONNECT_TIMEOUT:3s}
      read-timeout: ${AI_RADAR_HN_READ_TIMEOUT:5s}
      max-attempts: ${AI_RADAR_HN_MAX_ATTEMPTS:2}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

logging:
  level:
    root: INFO
    com.airadar: ${AI_RADAR_LOG_LEVEL:INFO}
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] [%X{requestId:-}] %logger{36} - %msg%n"
