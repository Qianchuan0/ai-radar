openapi: 3.1.0
info:
  title: AI Radar First Data Flow API
  version: 0.8.0
  description: |
    Implemented contract for the first AI Radar data flow. Manual crawling is
    synchronous in Phase 2, so its response contains the terminal task state.
servers:
  - url: http://localhost:8080
tags:
  - name: Health
  - name: Sources
  - name: Crawl Tasks
  - name: Hot Clusters
  - name: Analysis
  - name: Subscriptions
  - name: Alerts
  - name: Reports
  - name: Evaluation
paths:
  /api/health:
    get:
      tags: [Health]
      summary: Check whether the backend application is running
      operationId: getHealth
      responses:
        "200":
          description: Application is running
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/v1/sources:
    post:
      tags: [Sources]
      summary: Create a source configuration
      operationId: createSource
      parameters:
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSourceRequest"
      responses:
        "201":
          description: Source configuration created
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
    get:
      tags: [Sources]
      summary: List source configurations
      operationId: listSources
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - name: sourceType
          in: query
          schema:
            $ref: "#/components/schemas/SourceType"
        - name: enabled
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Source configurations returned
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceListResponse"
  /api/v1/sources/{sourceId}/status:
    patch:
      tags: [Sources]
      summary: Enable or disable a source configuration
      operationId: updateSourceStatus
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/SourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSourceStatusRequest"
      responses:
        "200":
          description: Source status updated
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/sources/{sourceId}/crawl-tasks:
    post:
      tags: [Crawl Tasks]
      summary: Start one manual crawl
      description: |
        Creates a crawl task for an enabled source. Reusing the same
        Idempotency-Key must return the existing task instead of starting
        another crawl.
      operationId: startManualCrawl
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/SourceId"
        - name: Idempotency-Key
          in: header
          required: true
          description: Client-generated key for duplicate request suppression.
          schema:
            type: string
            minLength: 1
            maxLength: 128
            pattern: "^[A-Za-z0-9._-]+$"
      responses:
        "200":
          description: Crawl completed and terminal task state returned
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrawlTaskResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/v1/crawl-tasks/{taskId}:
    get:
      tags: [Crawl Tasks]
      summary: Get crawl task status and statistics
      operationId: getCrawlTask
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/TaskId"
      responses:
        "200":
          description: Crawl task returned
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrawlTaskResponse"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/hot-clusters:
    get:
      tags: [Hot Clusters]
      summary: List event-level hot clusters
      operationId: listHotClusters
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: sort
          in: query
          description: Ranking strategy for the hot cluster list.
          schema:
            type: string
            enum: [SCORE_DESC, LATEST]
            default: SCORE_DESC
        - name: sourceType
          in: query
          schema:
            $ref: "#/components/schemas/SourceType"
        - name: from
          in: query
          description: Include clusters seen at or after this instant.
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          description: Include clusters seen before or at this instant.
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Hot cluster page returned
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HotClusterPageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
  /api/v1/hot-clusters/{clusterId}:
    get:
      tags: [Hot Clusters]
      summary: Get one hot cluster with evidence and score details
      operationId: getHotCluster
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/ClusterId"
      responses:
        "200":
          description: Hot cluster returned
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HotClusterDetailResponse"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/hot-clusters/{clusterId}/analysis-runs:
    post:
      tags: [Analysis]
      summary: Generate one structured analysis run for a hot cluster
      operationId: triggerClusterAnalysis
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/ClusterId"
      responses:
        "200":
          description: Structured analysis run completed and returned
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClusterAnalysisResponse"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/hot-clusters/{clusterId}/analysis:
    get:
      tags: [Analysis]
      summary: Get the latest structured analysis for a hot cluster
      operationId: getLatestClusterAnalysis
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/ClusterId"
      responses:
        "200":
          description: Latest structured analysis returned
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClusterAnalysisResponse"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/subscriptions:
    post:
      tags: [Subscriptions]
      summary: Create a subscription rule
      operationId: createSubscription
      parameters:
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubscriptionRequest"
      responses:
        "201":
          description: Subscription rule created
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
    get:
      tags: [Subscriptions]
      summary: List subscription rules
      operationId: listSubscriptions
      parameters:
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Subscription rules returned
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionListResponse"
  /api/v1/subscriptions/{subscriptionId}/status:
    patch:
      tags: [Subscriptions]
      summary: Enable or disable a subscription rule
      operationId: updateSubscriptionStatus
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/SubscriptionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSubscriptionStatusRequest"
      responses:
        "200":
          description: Subscription rule updated
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/alerts/matching-runs:
    post:
      tags: [Alerts]
      summary: Run one manual alert matching pass
      operationId: runAlertMatching
      parameters:
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Alert matching completed and returned
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertMatchingRunResponse"
  /api/v1/alerts:
    get:
      tags: [Alerts]
      summary: List alert records
      operationId: listAlerts
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: subscriptionId
          in: query
          schema:
            type: integer
            format: int64
            minimum: 1
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/AlertStatus"
      responses:
        "200":
          description: Alert page returned
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertPageResponse"
  /api/v1/alerts/{alertId}/status:
    patch:
      tags: [Alerts]
      summary: Update one alert status
      operationId: updateAlertStatus
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/AlertId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAlertStatusRequest"
      responses:
        "200":
          description: Alert returned with updated status
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/reports/daily-runs:
    post:
      tags: [Reports]
      summary: Generate or refresh one daily report snapshot
      operationId: generateDailyReport
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Daily report generation completed
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyReportGenerationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
  /api/v1/reports/daily:
    get:
      tags: [Reports]
      summary: List generated daily reports
      operationId: listDailyReports
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Daily report page returned
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyReportPageResponse"
  /api/v1/reports/daily/{reportDate}:
    get:
      tags: [Reports]
      summary: Get one generated daily report
      operationId: getDailyReport
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - name: reportDate
          in: path
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Daily report returned
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyReportResponse"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/evaluation/datasets:
    post:
      tags: [Evaluation]
      summary: Create an evaluation dataset
      operationId: createEvaluationDataset
      parameters:
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEvaluationDatasetRequest"
      responses:
        "201":
          description: Evaluation dataset created
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluationDatasetResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
    get:
      tags: [Evaluation]
      summary: List evaluation datasets
      operationId: listEvaluationDatasets
      parameters:
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Evaluation datasets returned
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluationDatasetListResponse"
  /api/v1/evaluation/datasets/{datasetId}/cases:
    post:
      tags: [Evaluation]
      summary: Create a labeled evaluation case
      operationId: createEvaluationCase
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - name: datasetId
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEvaluationCaseRequest"
      responses:
        "201":
          description: Evaluation case created
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluationCaseResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    get:
      tags: [Evaluation]
      summary: List evaluation cases for one dataset
      operationId: listEvaluationCases
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - name: datasetId
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: Evaluation cases returned
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluationCaseListResponse"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/evaluation/runs:
    post:
      tags: [Evaluation]
      summary: Manually trigger one evaluation run for a dataset
      operationId: triggerEvaluationRun
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - name: datasetId
          in: query
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: Evaluation run completed
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluationRunGenerationResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
    get:
      tags: [Evaluation]
      summary: List evaluation runs
      operationId: listEvaluationRuns
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: datasetId
          in: query
          required: false
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: Evaluation run page returned
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluationRunPageResponse"
  /api/v1/evaluation/runs/{runId}:
    get:
      tags: [Evaluation]
      summary: Get one evaluation run with metrics, error analysis, and case results
      operationId: getEvaluationRun
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - name: runId
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: Evaluation run returned
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluationRunResponse"
        "404":
          $ref: "#/components/responses/NotFound"
components:
  headers:
    RequestId:
      description: Request correlation identifier.
      schema:
        type: string
  parameters:
    RequestId:
      name: X-Request-Id
      in: header
      required: false
      description: Optional caller-provided correlation identifier.
      schema:
        type: string
        minLength: 1
        maxLength: 128
        pattern: "^[A-Za-z0-9._-]+$"
    SourceId:
      name: sourceId
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    TaskId:
      name: taskId
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    ClusterId:
      name: clusterId
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    SubscriptionId:
      name: subscriptionId
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    AlertId:
      name: alertId
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
  responses:
    BadRequest:
      description: Invalid request
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Resource state or uniqueness conflict
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    SourceType:
      type: string
      enum: [ARXIV, HACKER_NEWS, GITHUB, HUGGING_FACE]
    AnalysisType:
      type: string
      enum: [CLUSTER_BRIEF]
    AnalysisRunStatus:
      type: string
      enum: [PENDING, RUNNING, SUCCEEDED, FAILED]
    AlertStatus:
      type: string
      enum: [NEW, ACKED, DISMISSED]
    ReportStatus:
      type: string
      enum: [GENERATED]
    CrawlTaskStatus:
      type: string
      enum: [PENDING, RUNNING, SUCCEEDED, PARTIAL_FAILED, FAILED, CANCELLED]
    CreateSourceRequest:
      type: object
      additionalProperties: false
      required: [sourceCode, sourceType, displayName, enabled, config]
      properties:
        sourceCode:
          type: string
          minLength: 1
          maxLength: 64
          pattern: "^[a-z0-9-]+$"
        sourceType:
          $ref: "#/components/schemas/SourceType"
        displayName:
          type: string
          minLength: 1
          maxLength: 100
        enabled:
          type: boolean
        crawlIntervalMinutes:
          type: [integer, "null"]
          minimum: 1
        config:
          type: object
          description: Non-secret collection filters and source-specific settings.
          additionalProperties: true
    UpdateSourceStatusRequest:
      type: object
      additionalProperties: false
      required: [enabled]
      properties:
        enabled:
          type: boolean
    CreateSubscriptionRequest:
      type: object
      additionalProperties: false
      required: [name, enabled, keywords, sourceTypes, suppressWindowHours]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        enabled:
          type: boolean
        keywords:
          type: array
          minItems: 1
          items:
            type: string
            minLength: 1
            maxLength: 80
        sourceTypes:
          type: array
          items:
            $ref: "#/components/schemas/SourceType"
        minScore:
          type: [number, "null"]
          minimum: 0
        suppressWindowHours:
          type: integer
          minimum: 1
          maximum: 720
    UpdateSubscriptionStatusRequest:
      type: object
      additionalProperties: false
      required: [enabled]
      properties:
        enabled:
          type: boolean
    UpdateAlertStatusRequest:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          $ref: "#/components/schemas/AlertStatus"
    Source:
      type: object
      required:
        [id, sourceCode, sourceType, displayName, enabled, config, version, createdAt, updatedAt]
      properties:
        id:
          type: integer
          format: int64
        sourceCode:
          type: string
        sourceType:
          $ref: "#/components/schemas/SourceType"
        displayName:
          type: string
        enabled:
          type: boolean
        crawlIntervalMinutes:
          type: [integer, "null"]
        config:
          type: object
          additionalProperties: true
        version:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    SubscriptionRule:
      type: object
      required:
        [id, name, enabled, keywords, sourceTypes, suppressWindowHours, version, createdAt, updatedAt]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        enabled:
          type: boolean
        keywords:
          type: array
          items:
            type: string
        sourceTypes:
          type: array
          items:
            $ref: "#/components/schemas/SourceType"
        minScore:
          type: [number, "null"]
        suppressWindowHours:
          type: integer
          minimum: 1
        version:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CrawlTask:
      type: object
      required:
        [id, sourceId, triggerType, status, requestedAt, fetchedCount, persistedCount, matchedCount, failedCount, errors]
      properties:
        id:
          type: integer
          format: int64
        sourceId:
          type: integer
          format: int64
        triggerType:
          type: string
          enum: [MANUAL, SCHEDULED, RETRY]
        status:
          $ref: "#/components/schemas/CrawlTaskStatus"
        retryOfTaskId:
          type: [integer, "null"]
          format: int64
        requestedAt:
          type: string
          format: date-time
        startedAt:
          type: [string, "null"]
          format: date-time
        finishedAt:
