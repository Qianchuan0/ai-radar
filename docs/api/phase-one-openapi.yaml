openapi: 3.1.0
info:
  title: AI Radar Phase 1 API Contract
  version: 0.1.0
  description: |
    Contract for the first AI Radar data flow. Except for GET /api/health,
    these endpoints are design deliverables and are not implemented in Phase 1.
servers:
  - url: http://localhost:8080
tags:
  - name: Health
  - name: Sources
  - name: Crawl Tasks
  - name: Hot Clusters
paths:
  /api/health:
    get:
      tags: [Health]
      summary: Check whether the backend application is running
      operationId: getHealth
      responses:
        "200":
          description: Application is running
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/v1/sources:
    post:
      tags: [Sources]
      summary: Create a source configuration
      operationId: createSource
      parameters:
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSourceRequest"
      responses:
        "201":
          description: Source configuration created
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
    get:
      tags: [Sources]
      summary: List source configurations
      operationId: listSources
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - name: sourceType
          in: query
          schema:
            $ref: "#/components/schemas/SourceType"
        - name: enabled
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Source configurations returned
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceListResponse"
  /api/v1/sources/{sourceId}/status:
    patch:
      tags: [Sources]
      summary: Enable or disable a source configuration
      operationId: updateSourceStatus
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/SourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSourceStatusRequest"
      responses:
        "200":
          description: Source status updated
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/sources/{sourceId}/crawl-tasks:
    post:
      tags: [Crawl Tasks]
      summary: Start one manual crawl
      description: |
        Creates a crawl task for an enabled source. Reusing the same
        Idempotency-Key must return the existing task instead of starting
        another crawl.
      operationId: startManualCrawl
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/SourceId"
        - name: Idempotency-Key
          in: header
          required: true
          description: Client-generated key for duplicate request suppression.
          schema:
            type: string
            minLength: 1
            maxLength: 128
            pattern: "^[A-Za-z0-9._-]+$"
      responses:
        "202":
          description: Crawl task accepted
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrawlTaskResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/v1/crawl-tasks/{taskId}:
    get:
      tags: [Crawl Tasks]
      summary: Get crawl task status and statistics
      operationId: getCrawlTask
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/TaskId"
      responses:
        "200":
          description: Crawl task returned
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrawlTaskResponse"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/hot-clusters:
    get:
      tags: [Hot Clusters]
      summary: List event-level hot clusters
      operationId: listHotClusters
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: sourceType
          in: query
          schema:
            $ref: "#/components/schemas/SourceType"
        - name: from
          in: query
          description: Include clusters seen at or after this instant.
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          description: Include clusters seen before or at this instant.
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Hot cluster page returned
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HotClusterPageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
  /api/v1/hot-clusters/{clusterId}:
    get:
      tags: [Hot Clusters]
      summary: Get one hot cluster with evidence and score details
      operationId: getHotCluster
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/ClusterId"
      responses:
        "200":
          description: Hot cluster returned
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HotClusterDetailResponse"
        "404":
          $ref: "#/components/responses/NotFound"
components:
  headers:
    RequestId:
      description: Request correlation identifier.
      schema:
        type: string
  parameters:
    RequestId:
      name: X-Request-Id
      in: header
      required: false
      description: Optional caller-provided correlation identifier.
      schema:
        type: string
        minLength: 1
        maxLength: 128
        pattern: "^[A-Za-z0-9._-]+$"
    SourceId:
      name: sourceId
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    TaskId:
      name: taskId
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    ClusterId:
      name: clusterId
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
  responses:
    BadRequest:
      description: Invalid request
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Resource state or uniqueness conflict
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    SourceType:
      type: string
      enum: [ARXIV, HACKER_NEWS, GITHUB]
    CrawlTaskStatus:
      type: string
      enum: [PENDING, RUNNING, SUCCEEDED, PARTIAL_FAILED, FAILED, CANCELLED]
    CreateSourceRequest:
      type: object
      additionalProperties: false
      required: [sourceCode, sourceType, displayName, enabled, config]
      properties:
        sourceCode:
          type: string
          minLength: 1
          maxLength: 64
          pattern: "^[a-z0-9-]+$"
        sourceType:
          $ref: "#/components/schemas/SourceType"
        displayName:
          type: string
          minLength: 1
          maxLength: 100
        enabled:
          type: boolean
        crawlIntervalMinutes:
          type: [integer, "null"]
          minimum: 1
        config:
          type: object
          description: Non-secret collection filters and source-specific settings.
          additionalProperties: true
    UpdateSourceStatusRequest:
      type: object
      additionalProperties: false
      required: [enabled]
      properties:
        enabled:
          type: boolean
    Source:
      type: object
      required:
        [id, sourceCode, sourceType, displayName, enabled, config, version, createdAt, updatedAt]
      properties:
        id:
          type: integer
          format: int64
        sourceCode:
          type: string
        sourceType:
          $ref: "#/components/schemas/SourceType"
        displayName:
          type: string
        enabled:
          type: boolean
        crawlIntervalMinutes:
          type: [integer, "null"]
        config:
          type: object
          additionalProperties: true
        version:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CrawlTask:
      type: object
      required:
        [id, sourceId, triggerType, status, requestedAt, fetchedCount, persistedCount, failedCount]
      properties:
        id:
          type: integer
          format: int64
        sourceId:
          type: integer
          format: int64
        triggerType:
          type: string
          enum: [MANUAL, SCHEDULED, RETRY]
        status:
          $ref: "#/components/schemas/CrawlTaskStatus"
        retryOfTaskId:
          type: [integer, "null"]
          format: int64
        requestedAt:
          type: string
          format: date-time
        startedAt:
          type: [string, "null"]
          format: date-time
        finishedAt:
          type: [string, "null"]
          format: date-time
        fetchedCount:
          type: integer
          minimum: 0
        persistedCount:
          type: integer
          minimum: 0
        failedCount:
          type: integer
          minimum: 0
        failureCode:
          type: [string, "null"]
        failureMessage:
          type: [string, "null"]
    ScoreBreakdown:
      type: object
      required: [total, version, calculatedAt, components]
      properties:
        total:
          type: number
          minimum: 0
        version:
          type: string
        calculatedAt:
          type: string
          format: date-time
        components:
          type: object
          additionalProperties:
            type: number
    HotItemEvidence:
      type: object
      required: [id, sourceType, externalId, title, sourceUrl, matchMethod, ruleVersion]
      properties:
        id:
          type: integer
          format: int64
        sourceType:
          $ref: "#/components/schemas/SourceType"
        externalId:
          type: string
        title:
          type: string
        summary:
          type: [string, "null"]
        sourceUrl:
          type: string
          format: uri
        author:
          type: [string, "null"]
        publishedAt:
          type: [string, "null"]
          format: date-time
        matchMethod:
          type: string
        matchScore:
          type: [number, "null"]
          minimum: 0
          maximum: 1
        matchReason:
          type: object
          additionalProperties: true
        ruleVersion:
          type: string
    HotClusterSummary:
      type: object
      required: [id, title, status, firstSeenAt, lastSeenAt, itemCount, score]
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        summary:
          type: [string, "null"]
        status:
          type: string
          enum: [ACTIVE, MERGED, ARCHIVED]
        firstSeenAt:
          type: string
          format: date-time
        lastSeenAt:
          type: string
          format: date-time
        itemCount:
          type: integer
          minimum: 1
        score:
          $ref: "#/components/schemas/ScoreBreakdown"
    HotClusterDetail:
      allOf:
        - $ref: "#/components/schemas/HotClusterSummary"
        - type: object
          required: [items]
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/HotItemEvidence"
    PageMetadata:
      type: object
      required: [page, size, totalElements, totalPages]
      properties:
        page:
          type: integer
          minimum: 1
        size:
          type: integer
          minimum: 1
        totalElements:
          type: integer
          format: int64
          minimum: 0
        totalPages:
          type: integer
          minimum: 0
    HealthResponse:
      type: object
      required: [code, message, data, timestamp]
      properties:
        code:
          const: OK
        message:
          const: Success
        data:
          type: object
          required: [status, service]
          properties:
            status:
              const: UP
            service:
              const: ai-radar-backend
        timestamp:
          type: string
          format: date-time
    SourceResponse:
      type: object
      required: [code, message, data, timestamp]
      properties:
        code:
          const: OK
        message:
          const: Success
        data:
          $ref: "#/components/schemas/Source"
        timestamp:
          type: string
          format: date-time
    SourceListResponse:
      type: object
      required: [code, message, data, timestamp]
      properties:
        code:
          const: OK
        message:
          const: Success
        data:
          type: array
          items:
            $ref: "#/components/schemas/Source"
        timestamp:
          type: string
          format: date-time
    CrawlTaskResponse:
      type: object
      required: [code, message, data, timestamp]
      properties:
        code:
          const: OK
        message:
          const: Success
        data:
          $ref: "#/components/schemas/CrawlTask"
        timestamp:
          type: string
          format: date-time
    HotClusterPageResponse:
      type: object
      required: [code, message, data, timestamp]
      properties:
        code:
          const: OK
        message:
          const: Success
        data:
          type: object
          required: [items, page]
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/HotClusterSummary"
            page:
              $ref: "#/components/schemas/PageMetadata"
        timestamp:
          type: string
          format: date-time
    HotClusterDetailResponse:
      type: object
      required: [code, message, data, timestamp]
      properties:
        code:
          const: OK
        message:
          const: Success
        data:
          $ref: "#/components/schemas/HotClusterDetail"
        timestamp:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      required: [code, message, timestamp]
      properties:
        code:
          type: string
          examples: [COMMON.INVALID_ARGUMENT]
        message:
          type: string
        data:
          type: "null"
        timestamp:
          type: string
          format: date-time
